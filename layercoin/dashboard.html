<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | LayerCoin</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="sidebar" class="sidebar">
        <h2 style="margin-bottom: 2rem;">LayerCoin</h2>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <a href="index.html" class="nav-link">Home</a>
            <a href="dashboard.html" class="nav-link" style="color: var(--primary);">Dashboard</a>
            <a href="referral.html" class="nav-link">Referral</a>
            <a href="withdraw.html" class="nav-link">Withdraw</a>
            <a href="about.html" class="nav-link">About Us</a>
            <!-- Admin link hidden by default, shown via auth.js for admin users if needed, 
                 but per requirement: "Admin panel must remain accessible only via direct admin.html URL."
                 So we don't necessarily need to SHOW it unless we want to, but the instructions say
                 "Remove Admin from sidebar for normal users." which implies it might be there for admins.
                 However, "Admin panel must remain accessible only via direct admin.html URL" suggests we just remove it.
            -->
        </div>
    </div>

    <nav>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button id="btnToggleSidebar" class="btn btn-outline" style="padding: 0.5rem;">☰</button>
            <div class="logo" style="font-weight: 700;">LayerCoin</div>
        </div>
        <div class="nav-links">
            <div id="notiBell" style="cursor: pointer; position: relative;">
                🔔 <span id="notiBadge"
                    style="position: absolute; top: -5px; right: -5px; background: var(--error); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; display: none;">0</span>
            </div>
            <span id="userName" class="font-bold">Explorer</span>
            <button id="btnLogout" class="btn btn-outline">Logout</button>
            <button id="themeToggleBtn" class="btn btn-outline" style="margin-left:0.5rem;">
                🌙
            </button>
        </div>

        <div id="notiPanel" class="card"
            style="position: absolute; top: 70px; right: 2rem; width: 300px; display: none; z-index: 1000;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h4 style="margin: 0;">Notifications</h4>
                <button id="btnMarkAllRead" class="btn"
                    style="padding: 0; color: var(--primary); font-size: 0.8rem;">Clear All</button>
            </div>
            <div id="notiList" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
    </nav>

    <main class="container">
        <!-- Balance Area -->
        <div class="card" style="max-width: 400px; margin-bottom: 1.5rem;">
            <p class="text-muted" style="font-size: 0.85rem; text-transform: uppercase;">Total Balance</p>
            <h1 id="coinBalance" style="font-size: 3rem; margin: 0.5rem 0;">0</h1>
            <p class="text-success font-bold">+2.0 LC / Action</p>
        </div>

        <!-- Blog/Earning Area -->
        <div class="card" style="padding: 0;">
            <div id="adBannerTop"
                style="padding: 1rem; text-align: center; border-bottom: 1px solid var(--border); display: none;"></div>
            <div
                style="padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h3 id="blogTitle">Ready to start?</h3>
                    <div style="display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem;">
                        <span id="rewardTimerVal" class="font-bold"
                            style="background: var(--primary); color: white; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 6px;">0</span>
                        <div class="progress-bar" style="width: 150px;">
                            <div id="rewardRingPath" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="btnPrevBlog" class="btn btn-outline">Previous</button>
                    <button id="btnNextBlog" class="btn btn-primary">Next Action</button>
                </div>
            </div>
            <div id="blogViewer" style="max-height: 600px; overflow-y: auto; padding: 1.5rem;">
                <div id="readProgress" style="height: 0;"></div>
                <img id="blogImage" style="width: 100%; border-radius: 8px; margin-bottom: 1rem; display: none;">
                <div id="blogVideoContainer" style="display: none; margin-bottom: 1rem;">
                    <iframe id="blogVideo" width="100%" height="315" frameborder="0" allowfullscreen></iframe>
                </div>
                <div id="blogContent"></div>
                <div id="adSocialBottom" style="margin-top: 1.5rem; text-align: center;"></div>
                <div id="pageInfoDisplay"
                    style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span id="pageNumber">Page 0 of 0</span>
                        <div style="display: flex; gap: 1rem;">
                            <span>Completed: <span id="pagesCompleted" class="font-bold"
                                    style="color: var(--success);">0</span></span>
                            <span>Remaining: <span id="pagesRemaining" class="font-bold"
                                    style="color: var(--primary);">0</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
